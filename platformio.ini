;  PlatformIO Project Configuration File
;
; Two upload environments:
;   usb  — flash via USB cable (default)
;   ota  — flash over WiFi (device must be on network, STA mode)
;
; In VS Code: click the environment name in the bottom status bar to switch.
; On the command line:
;   pio run -e usb -t upload
;   pio run -e ota -t upload

[platformio]
default_envs = usb

; ── Shared settings ────────────────────────────────────────────────────────────
[env]
platform     = espressif32
board        = lilygo-t-display-s3
framework    = arduino
monitor_speed = 115200
lib_deps =
	dfrobot/DFRobot_BME280@^1.0.2
	mathieucarbou/ESPAsyncWebServer@^3.4.5
	bodmer/TFT_eSPI@^2.5.43
	knolleary/PubSubClient@^2.8
build_flags =
	-DARDUINO_USB_MODE=1
	-DARDUINO_USB_CDC_ON_BOOT=1

; ── USB upload (default) ───────────────────────────────────────────────────────
[env:usb]
upload_port = COM3        ; <-- change to match your port (check Device Manager)

; ── OTA upload ─────────────────────────────────────────────────────────────────
[env:ota]
upload_protocol = espota
upload_port     = 192.168.1.117   ; <-- replace with IP shown on device display
